<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Online Shopping — Search & Navigation</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Categories">
      <h2>Categories</h2>
      <ul id="category-list" class="categories"></ul>
    </aside>

    <main class="main">
      <header class="searchbar">
        <input id="search-input" type="search" placeholder="Search products, e.g. 'sneakers'" aria-label="Search products" />
        <select id="sort-select" aria-label="Sort results">
          <option value="relevance">Relevance</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
        </select>
      </header>

      <section id="results" class="results" aria-live="polite"></section>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
